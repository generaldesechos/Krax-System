<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Frequencies | Final CRT Synth</title>
    <style>
        :root { --bg: #020205; --gold: #f0e68c; --gap: 3000px; --crt-green: #33ff33; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; scroll-behavior: smooth; }

        .scroll-track { height: 33000px; position: relative; }

        .sticky-wrapper {
            position: sticky; top: 0; width: 100%; height: 100vh;
            overflow: hidden; perspective: 1200px; perspective-origin: 50% 50%;
        }

        .star-field {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #050505 100%);
            z-index: -1;
        }

        #stage { width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }

        .section {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: opacity 1s ease-out; opacity: 0; pointer-events: none;
        }

        .planet-container { position: relative; display: flex; justify-content: center; align-items: center; width: 250px; height: 250px; transform-style: preserve-3d; }
        .planet { width: 250px; height: 250px; border-radius: 50%; cursor: pointer; box-shadow: inset -30px -30px 50px #000; z-index: 10; -webkit-tap-highlight-color: transparent;}
        .ring { position: absolute; width: 450px; height: 100px; border-radius: 50%; background: rgba(223, 209, 149, 0.4); border: 2px solid rgba(122, 110, 66, 0.8); transform: rotateX(75deg); z-index: 5; pointer-events: none; }

        .info { text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px #000; }

        /* Dashboard & Oscilloscope */
        #dashboard {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 1s;
        }

        #oscilloscope {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.6;
        }

        .controls { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }
        .toggle-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 11px; }
        .toggle-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }

        .planet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 15px; width: 95%; max-width: 900px; justify-items: center; }
        .mini-card { display: flex; flex-direction: column; align-items: center; text-align: center; font-size: 9px; }
        .mini-planet-container { position: relative; width: 50px; height: 50px; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; }
        .mini-planet { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; box-shadow: inset -8px -8px 12px #000; z-index: 10; }
        .mini-ring { position: absolute; width: 90px; height: 20px; background: rgba(223, 209, 149, 0.3); border: 1px solid rgba(122, 110, 66, 0.5); border-radius: 50%; transform: rotateX(75deg); z-index: 5; }

        /* Planet Textures */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 50px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #4a0e05); }
        .jupiter { background: radial-gradient(circle at 30% 30%, #d39c7e, #6e4a38); }
        .saturn { background: radial-gradient(circle at 30% 30%, #dfd195, #7a6e42); }
        .uranus { background: radial-gradient(circle at 30% 30%, #b2e1e5, #4e8a8e); }
        .neptune { background: radial-gradient(circle at 30% 30%, #4b70dd, #1a2a6c); }
        .planetx { background: radial-gradient(circle at 30% 30%, #222, #000); box-shadow: 0 0 20px #444; }

        .hint { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--gold); pointer-events: none; }
    </style>
</head>
<body>

    <div class="scroll-track">
        <div class="sticky-wrapper">
            <div class="star-field"></div>
            <div class="hint" id="hint">SCROLL TO BEGIN VOYAGE</div>
            <div id="stage"></div>

            <div id="dashboard">
                <canvas id="oscilloscope"></canvas>
                <h2 style="color: var(--gold); letter-spacing: 5px; margin: 10px 0;">SOLAR SYNTHESIZER</h2>
                
                <div style="background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #333; border-radius: 10px; margin-bottom: 15px; width: 85%; max-width: 350px;">
                    <label style="color: var(--gold); font-size: 11px; letter-spacing: 2px;">HEARTBEAT ENGINE</label>
                    <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                        <button class="toggle-btn" id="hb-toggle">PULSE: OFF</button>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="range" id="hb-tempo" min="0.5" max="4.0" step="0.1" value="1.0" style="flex: 1;">
                            <span id="hb-val" style="font-size: 10px; min-width: 40px;">1.0 Hz</span>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <span style="font-size: 10px;">DECAY:</span>
                    <button class="toggle-btn active" id="btn-short">SHORT</button>
                    <button class="toggle-btn" id="btn-long">LONG</button>
                </div>
                <div class="planet-grid" id="synth-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const planetsData = [
            { name: "THE SUN", freq: 126.22, class: "sun" },
            { name: "MERCURY", freq: 141.27, class: "mercury" },
            { name: "VENUS", freq: 221.23, class: "venus" },
            { name: "EARTH", freq: 194.18, class: "earth" },
            { name: "MARS", freq: 144.72, class: "mars" },
            { name: "JUPITER", freq: 183.58, class: "jupiter" },
            { name: "SATURN", freq: 147.85, class: "saturn" },
            { name: "URANUS", freq: 207.36, class: "uranus" },
            { name: "NEPTUNE", freq: 211.44, class: "neptune" },
            { name: "PLANET X", freq: 123.45, class: "planetx" }
        ];

        const stage = document.getElementById('stage');
        const synthGrid = document.getElementById('synth-grid');
        let toneDuration = 1.0;
        const zoomStep = 3000;

        // Build UI
        planetsData.forEach((p, i) => {
            const isSaturn = p.class === "saturn";
            const sec = document.createElement('div');
            sec.className = 'section';
            sec.style.transform = `translate3d(0, 0, ${i * -zoomStep}px)`;
            let planetHTML = `<div class="planet-container">${isSaturn ? '<div class="ring"></div>' : ''}<div class="planet ${p.class}" data-freq="${p.freq}"></div></div>`;
            sec.innerHTML = `<div class="info"><h1>${p.name}</h1><p>${p.freq} Hz</p></div>${planetHTML}`;
            stage.appendChild(sec);

            const card = document.createElement('div');
            card.className = 'mini-card';
            card.innerHTML = `<div class="mini-planet-container">${isSaturn ? '<div class="mini-ring"></div>' : ''}<div class="mini-planet ${p.class}" data-freq="${p.freq}"></div></div><label>${p.name.split(' ').pop()}</label><span>${p.freq}Hz</span>`;
            synthGrid.appendChild(card);
        });

        // Audio System
        let aCtx, analyser, dataArray, bufferLength;
        const canvas = document.getElementById('oscilloscope');
        const ctx = canvas.getContext('2d');

        function initAudio() {
            if (aCtx) return;
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            analyser.fftSize = 2048;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            analyser.connect(aCtx.destination);
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            analyser.getByteTimeDomainData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#33ff33';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#33ff33';
            ctx.beginPath();

            let sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function play(f) {
            initAudio();
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator();
            const g = aCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f, aCtx.currentTime);
            g.gain.setValueAtTime(0, aCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.2, aCtx.currentTime + 0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + toneDuration);
            o.connect(g); g.connect(analyser); // Connect to analyser instead of destination directly
            o.start(); o.stop(aCtx.currentTime + toneDuration);
        }

        function playKick() {
            initAudio();
            const o = aCtx.createOscillator();
            const g = aCtx.createGain();
            o.frequency.setValueAtTime(150, aCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(0.01, aCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.5, aCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + 0.5);
            o.connect(g); g.connect(analyser);
            o.start(); o.stop(aCtx.currentTime + 0.5);
        }

        // Standard Scroll Logic
        const sections = document.querySelectorAll('.section');
        const dashboard = document.getElementById('dashboard');
        const hint = document.getElementById('hint');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            stage.style.transform = `translate3d(0, 0, ${scrollY}px)`;
            sections.forEach((s, i) => {
                const zDist = Math.abs(scrollY - (i * zoomStep));
                if (zDist < 1200) {
                    s.style.opacity = "1";
                    s.style.pointerEvents = (zDist < 400) ? "auto" : "none";
                } else { s.style.opacity = "0"; s.style.pointerEvents = "none"; }
            });
            const maxScroll = (planetsData.length - 1) * zoomStep;
            if (scrollY > maxScroll + 1200) {
                dashboard.style.opacity = "1"; dashboard.style.pointerEvents = "auto"; hint.style.opacity = "0";
            } else {
                dashboard.style.opacity = "0"; dashboard.style.pointerEvents = "none"; hint.style.opacity = "1";
            }
        });

        // Heartbeat Logic
        let hbEnabled = false, hbInterval;
        const hbToggle = document.getElementById('hb-toggle'), hbTempo = document.getElementById('hb-tempo'), hbVal = document.getElementById('hb-val');
        function updateHeartbeat() {
            if (hbInterval) clearInterval(hbInterval);
            if (hbEnabled) hbInterval = setInterval(playKick, (1 / parseFloat(hbTempo.value)) * 1000);
        }
        hbToggle.onclick = () => {
            hbEnabled = !hbEnabled;
            hbToggle.textContent = `PULSE: ${hbEnabled ? 'ON' : 'OFF'}`;
            hbToggle.classList.toggle('active');
            updateHeartbeat();
        };
        hbTempo.oninput = () => { hbVal.textContent = `${hbTempo.value} Hz`; if (hbEnabled) updateHeartbeat(); };

        // Synth Controls
        document.querySelectorAll('[data-freq]').forEach(p => {
            p.addEventListener('pointerdown', () => {
                play(parseFloat(p.dataset.freq));
                p.style.filter = "brightness(2)";
                setTimeout(() => p.style.filter = "brightness(1)", 150);
            });
        });

        document.getElementById('btn-short').onclick = function() { toneDuration = 1.0; this.classList.add('active'); document.getElementById('btn-long').classList.remove('active'); };
        document.getElementById('btn-long').onclick = function() { toneDuration = 5.0; this.classList.add('active'); document.getElementById('btn-short').classList.remove('active'); };

        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
