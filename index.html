<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Frequencies | Cross-Browser Fix</title>
    <style>
        :root {
            --bg-dark: #020205;
            --text-gold: #f0e68c;
        }

        /* 1. Critical Safari Fix: Perspective on the outermost container */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            /* perspective needs to be here for Safari/Firefox stability */
            perspective: 1000px;
            perspective-origin: 50% 50%;
        }

        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        /* 2. The scroll height provider */
        .scroll-container {
            height: 1200vh;
            width: 100%;
        }

        /* 3. The 3D Stage: Must have preserve-3d for Safari */
        #stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            transform-style: preserve-3d;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Every layer needs preserve-3d for iOS */
            transform-style: preserve-3d;
            pointer-events: none; /* Allows clicking through to planet */
        }

        .info {
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            transform: translateZ(50px); /* Lift text slightly off planet */
        }

        .visible { opacity: 1; }

        .planet {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto; /* Re-enable for the planet itself */
            box-shadow: inset -40px -40px 60px #000;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s;
        }

        .planet:active { transform: scale(0.95); }

        /* Planets */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 80px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #00d2ff, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #8b0000); }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.9rem;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="star-field"></div>
    <div class="scroll-hint">SCROLL TO TRAVEL</div>

    <div class="scroll-container">
        <div id="stage">
            <div class="section" style="transform: translateZ(0px)">
                <div class="info visible"><h1>THE SUN</h1><p>126.22 Hz</p></div>
                <div class="planet sun" data-freq="126.22"></div>
            </div>
            <div class="section" style="transform: translateZ(-2500px)">
                <div class="info"><h2>MERCURY</h2><p>141.27 Hz</p></div>
                <div class="planet mercury" data-freq="141.27"></div>
            </div>
            <div class="section" style="transform: translateZ(-5000px)">
                <div class="info"><h2>VENUS</h2><p>221.23 Hz</p></div>
                <div class="planet venus" data-freq="221.23"></div>
            </div>
            <div class="section" style="transform: translateZ(-7500px)">
                <div class="info"><h2>EARTH</h2><p>194.18 Hz</p></div>
                <div class="planet earth" data-freq="194.18"></div>
            </div>
            <div class="section" style="transform: translateZ(-10000px)">
                <div class="info"><h2>MARS</h2><p>144.72 Hz</p></div>
                <div class="planet mars" data-freq="144.72"></div>
            </div>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const infos = document.querySelectorAll('.info');
        const planets = document.querySelectorAll('.planet');
        
        // 1. Z-Scroll Logic
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            // Force 3D transform syntax for better Safari support
            stage.style.transform = `translate3d(0, 0, ${scrollY}px)`;

            document.querySelectorAll('.section').forEach((section, index) => {
                const depth = index * 2500;
                const distance = Math.abs(scrollY - depth);
                if (distance < 700) {
                    infos[index].classList.add('visible');
                } else {
                    infos[index].classList.remove('visible');
                }
            });
        });

        // 2. Audio Logic
        let audioCtx;

        function playFrequency(freq) {
            // iOS Audio Context initialization must happen inside a user-triggered event
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        planets.forEach(p => {
            p.addEventListener('pointerdown', (e) => {
                const freq = p.getAttribute('data-freq');
                playFrequency(parseFloat(freq));
            });
        });
    </script>
</body>
</html>
