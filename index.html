<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Synth | Clean Edition</title>
    <style>
        :root { --bg: #020205; --gold: #f0e68c; --crt-green: #33ff33; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; width: 100%; overscroll-behavior: none; }

        .scroll-container { height: 33000px; width: 100%; }

        .viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; perspective: 1000px; overflow: hidden; z-index: 1; }
        
        #stage { width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }

        .section { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transform-style: preserve-3d; opacity: 0; pointer-events: none; 
            transition: opacity 0.5s ease; 
        }

        .planet-container { position: relative; display: flex; justify-content: center; align-items: center; width: 250px; height: 250px; transform-style: preserve-3d; }
        .planet { width: 240px; height: 240px; border-radius: 50%; cursor: pointer; box-shadow: inset -30px -30px 50px #000; z-index: 10; }
        .ring { position: absolute; width: 440px; height: 90px; border-radius: 50%; background: rgba(223, 209, 149, 0.2); border: 2px solid rgba(122, 110, 66, 0.5); transform: rotateX(75deg); z-index: 5; }

        /* Dashboard */
        #dashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.8s; }
        #oscilloscope { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }
        
        .planet-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 90%; max-width: 800px; }
        .mini-card { display: flex; flex-direction: column; align-items: center; font-size: 9px; text-align: center; }
        .mini-planet { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; box-shadow: inset -6px -6px 10px #000; margin-bottom: 5px; }

        /* Textures */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 50px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #4a0e05); }
        .jupiter { background: radial-gradient(circle at 30% 30%, #d39c7e, #6e4a38); }
        .saturn { background: radial-gradient(circle at 30% 30%, #dfd195, #7a6e42); }
        .uranus { background: radial-gradient(circle at 30% 30%, #b2e1e5, #4e8a8e); }
        .neptune { background: radial-gradient(circle at 30% 30%, #4b70dd, #1a2a6c); }
        .planetx { background: radial-gradient(circle at 30% 30%, #222, #000); box-shadow: 0 0 20px #444; }

        .toggle-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .toggle-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="scroll-container"></div>

    <div class="viewport">
        <div id="stage"></div>
    </div>

    <div id="dashboard">
        <canvas id="oscilloscope"></canvas>
        <h3 style="color: var(--gold); letter-spacing: 5px; margin: 10px 0;">SOLAR SYNTHESIZER</h3>
        
        <div style="background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #333; border-radius: 10px; margin-bottom: 15px; width: 85%; max-width: 350px;">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="toggle-btn" id="hb-toggle">PULSE: OFF</button>
                <div style="display:flex; justify-content: space-between; font-size: 10px;"><span>TEMPO</span><span id="hb-val">1.0 Hz</span></div>
                <input type="range" id="hb-tempo" min="0.5" max="4.0" step="0.1" value="1.0">
                <div style="display:flex; justify-content: space-between; font-size: 10px;"><span>WAVEFORM: LINE</span><span>CIRCLE</span></div>
                <input type="range" id="wave-morph" min="0" max="1" step="0.01" value="0">
            </div>
        </div>

        <div class="planet-grid" id="synth-grid"></div>
    </div>

    <script>
        const planetsData = [
            { name: "THE SUN", freq: 126.22, class: "sun" },
            { name: "MERCURY", freq: 141.27, class: "mercury" },
            { name: "VENUS", freq: 221.23, class: "venus" },
            { name: "EARTH", freq: 194.18, class: "earth" },
            { name: "MARS", freq: 144.72, class: "mars" },
            { name: "JUPITER", freq: 183.58, class: "jupiter" },
            { name: "SATURN", freq: 147.85, class: "saturn" },
            { name: "URANUS", freq: 207.36, class: "uranus" },
            { name: "NEPTUNE", freq: 211.44, class: "neptune" },
            { name: "PLANET X", freq: 123.45, class: "planetx" }
        ];

        const stage = document.getElementById('stage');
        const synthGrid = document.getElementById('synth-grid');
        let morphVal = 0, toneDuration = 1.0;
        const zoomStep = 3000;

        planetsData.forEach((p, i) => {
            const home = i * zoomStep;
            const isSaturn = p.class === "saturn";

            const sec = document.createElement('div');
            sec.className = 'section';
            sec.style.transform = `translate3d(0, 0, -${home}px)`;
            sec.innerHTML = `<h1 style="margin-bottom:15px; font-size: 2rem;">${p.name}</h1><div class="planet-container">${isSaturn ? '<div class="ring"></div>' : ''}<div class="planet ${p.class}" data-freq="${p.freq}"></div></div>`;
            stage.appendChild(sec);

            const card = document.createElement('div');
            card.className = 'mini-card';
            card.innerHTML = `<div class="mini-planet ${p.class}" data-freq="${p.freq}"></div><label>${p.name.split(' ').pop()}</label>`;
            synthGrid.appendChild(card);
        });

        // Audio System
        let aCtx, analyser, dataArray;
        const canvas = document.getElementById('oscilloscope'), ctx = canvas.getContext('2d');

        function initAudio() {
            if (aCtx) return;
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            analyser.fftSize = 1024;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.connect(aCtx.destination);
            drawOsc();
        }

        function drawOsc() {
            requestAnimationFrame(drawOsc);
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3; ctx.strokeStyle = '#33ff33'; ctx.shadowBlur = 10; ctx.shadowColor = '#33ff33';
            ctx.beginPath();
            const cx = canvas.width / 2, cy = canvas.height / 2, r = Math.min(cx, cy) * 0.6;
            for (let i = 0; i < dataArray.length; i++) {
                let v = dataArray[i] / 128.0 - 1.0;
                let lx = (i / dataArray.length) * canvas.width;
                let ly = cy + v * (cy * 0.4);
                let ang = (i / dataArray.length) * Math.PI * 2;
                let crx = cx + Math.cos(ang) * (r + v * 60);
                let cry = cy + Math.sin(ang) * (r + v * 60);
                let x = lx * (1 - morphVal) + crx * morphVal;
                let y = ly * (1 - morphVal) + cry * morphVal;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            if(morphVal > 0.5) ctx.closePath();
            ctx.stroke();
        }

        function play(f) {
            initAudio(); if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(f, aCtx.currentTime);
            g.gain.setValueAtTime(0, aCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.2, aCtx.currentTime + 0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + toneDuration);
            o.connect(g); g.connect(analyser);
            o.start(); o.stop(aCtx.currentTime + toneDuration);
        }

        function playKick() {
            initAudio(); const o = aCtx.createOscillator(), g = aCtx.createGain();
            o.frequency.setValueAtTime(150, aCtx.currentTime); o.frequency.exponentialRampToValueAtTime(0.01, aCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.5, aCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + 0.5);
            o.connect(g); g.connect(analyser);
            o.start(); o.stop(aCtx.currentTime + 0.5);
        }

        // Scroll Performance
        const sections = document.querySelectorAll('.section'), dash = document.getElementById('dashboard');
        window.onscroll = () => {
            const y = window.pageYOffset;
            stage.style.transform = `translate3d(0, 0, ${y}px)`;
            sections.forEach((s, i) => {
                const dist = Math.abs(y - (i * zoomStep));
                s.style.opacity = dist < 1200 ? "1" : "0";
                s.style.pointerEvents = dist < 400 ? "auto" : "none";
            });
            const max = (planetsData.length - 1) * zoomStep;
            dash.style.opacity = y > max + 1000 ? "1" : "0";
            dash.style.pointerEvents = y > max + 1000 ? "auto" : "none";
        };

        // Inputs
        let hbEnabled = false, hbInt;
        document.getElementById('hb-toggle').onclick = (e) => {
            hbEnabled = !hbEnabled; e.target.textContent = `PULSE: ${hbEnabled ? 'ON' : 'OFF'}`;
            e.target.classList.toggle('active');
            if(hbInt) clearInterval(hbInt);
            if(hbEnabled) hbInt = setInterval(playKick, (1/parseFloat(document.getElementById('hb-tempo').value))*1000);
        };
        document.getElementById('hb-tempo').oninput = (e) => {
            document.getElementById('hb-val').textContent = `${e.target.value} Hz`;
            if(hbEnabled) { clearInterval(hbInt); hbInt = setInterval(playKick, (1/parseFloat(e.target.value))*1000); }
        };
        document.getElementById('wave-morph').oninput = (e) => { morphVal = parseFloat(e.target.value); };
        document.querySelectorAll('[data-freq]').forEach(p => p.onpointerdown = () => play(parseFloat(p.dataset.freq)));
        window.scrollTo(0,0);
    </script>
</body>
</html>
