<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Synth | High Performance</title>
    <style>
        :root { --bg: #020205; --gold: #f0e68c; --crt-green: #33ff33; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; width: 100%; overscroll-behavior: none; }

        .scroll-container { height: 35000px; width: 100%; }

        .viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; perspective: 1000px; overflow: hidden; z-index: 1; }
        
        /* Force GPU Acceleration */
        #stage { 
            width: 100%; height: 100%; 
            transform-style: preserve-3d; 
            will-change: transform;
            backface-visibility: hidden;
        }

        .section { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transform-style: preserve-3d; opacity: 0; pointer-events: none; 
            transition: opacity 0.4s ease; 
        }

        .planet-container { position: relative; display: flex; justify-content: center; align-items: center; width: 250px; height: 250px; transform-style: preserve-3d; }
        .planet { width: 240px; height: 240px; border-radius: 50%; cursor: pointer; box-shadow: inset -30px -30px 50px #000; z-index: 10; }
        .ring { position: absolute; width: 440px; height: 90px; border-radius: 50%; background: rgba(223, 209, 149, 0.2); border: 2px solid rgba(122, 110, 66, 0.5); transform: rotateX(75deg); z-index: 5; }

        /* Optimized Environments */
        .nebula {
            position: absolute; border-radius: 50%;
            opacity: 0.1; mix-blend-mode: screen;
            pointer-events: none;
            will-change: transform;
        }

        /* Earth Junk - using a simpler dot pattern instead of many divs */
        .junk-cloud {
            position: absolute; width: 600px; height: 600px;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0; transition: opacity 1s;
        }

        #dashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #oscilloscope { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }
        
        .planet-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 90%; max-width: 700px; }
        .mini-card { display: flex; flex-direction: column; align-items: center; font-size: 8px; }
        .mini-planet { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; box-shadow: inset -4px -4px 8px #000; }

        /* Styles for Planets */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 40px #ff6600; }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #06163a); }
        .saturn { background: radial-gradient(circle at 30% 30%, #dfd195, #7a6e42); }
        .planetx { background: #111; box-shadow: 0 0 20px #333; }
        /* ... other planets use simple colors for speed ... */
        .mercury { background: #888; } .venus { background: #e8c381; } .mars { background: #ff4b2b; }
        .jupiter { background: #d39c7e; } .uranus { background: #b2e1e5; } .neptune { background: #4b70dd; }

        .toggle-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; cursor: pointer; font-size: 10px; }
        .toggle-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="scroll-container"></div>

    <div class="viewport">
        <div id="stage">
            <div id="env-layer"></div>
        </div>
    </div>

    <div id="dashboard">
        <canvas id="oscilloscope"></canvas>
        <h3 style="color: var(--gold); margin: 5px 0;">GALACTIC SYNTH</h3>
        <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; width: 280px; text-align: center;">
            <button class="toggle-btn" id="hb-toggle">PULSE: OFF</button>
            <input type="range" id="hb-tempo" min="0.5" max="4.0" step="0.1" value="1.0" style="width:100%; margin-top:10px;">
            <input type="range" id="wave-morph" min="0" max="1" step="0.1" value="0" style="width:100%;">
        </div>
        <div class="planet-grid" id="synth-grid"></div>
    </div>

    <script>
        const planetsData = [
            { name: "SUN", freq: 126.22, class: "sun", neb: "orange" },
            { name: "MERCURY", freq: 141.27, class: "mercury" },
            { name: "VENUS", freq: 221.23, class: "venus" },
            { name: "EARTH", freq: 194.18, class: "earth", junk: true },
            { name: "MARS", freq: 144.72, class: "mars", neb: "red" },
            { name: "JUPITER", freq: 183.58, class: "jupiter" },
            { name: "SATURN", freq: 147.85, class: "saturn" },
            { name: "URANUS", freq: 207.36, class: "uranus", neb: "cyan" },
            { name: "NEPTUNE", freq: 211.44, class: "neptune" },
            { name: "PLANET X", freq: 123.45, class: "planetx" }
        ];

        const stage = document.getElementById('stage');
        const env = document.getElementById('env-layer');
        const synthGrid = document.getElementById('synth-grid');
        let morphVal = 0, toneDuration = 1.0;
        const zoomStep = 3000;

        planetsData.forEach((p, i) => {
            const home = i * zoomStep;
            const isSaturn = p.class === "saturn";

            // Planet Section
            const sec = document.createElement('div');
            sec.className = 'section';
            sec.style.transform = `translate3d(0, 0, -${home}px)`;
            sec.innerHTML = `<h1 style="margin:0">${p.name}</h1><div class="planet-container">${isSaturn ? '<div class="ring"></div>' : ''}<div class="planet ${p.class}" data-freq="${p.freq}"></div></div>`;
            stage.appendChild(sec);

            // Synth UI
            const card = document.createElement('div');
            card.className = 'mini-card';
            card.innerHTML = `<div class="mini-planet ${p.class}" data-freq="${p.freq}"></div><label>${p.name}</label>`;
            synthGrid.appendChild(card);

            // Optimized Nebula
            if (p.neb) {
                const n = document.createElement('div');
                n.className = 'nebula';
                n.style.background = `radial-gradient(circle, ${p.neb}, transparent 70%)`;
                n.style.width = '800px'; n.style.height = '800px';
                n.style.transform = `translate3d(${Math.random()*200-100}px, ${Math.random()*200-100}px, -${home}px)`;
                env.appendChild(n);
            }

            // Optimized Junk (Single Div with pattern)
            if (p.junk) {
                const j = document.createElement('div');
                j.className = 'junk-cloud';
                j.id = 'earth-junk';
                j.style.transform = `translate3d(-300px, -300px, -${home}px)`;
                env.appendChild(j);
            }
        });

        // Audio & Osc
        let aCtx, analyser, dataArray;
        const canvas = document.getElementById('oscilloscope'), ctx = canvas.getContext('2d');
        function initAudio() {
            if (aCtx) return; aCtx = new AudioContext();
            analyser = aCtx.createAnalyser(); analyser.fftSize = 512;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.connect(aCtx.destination);
            loop();
        }
        function loop() {
            requestAnimationFrame(loop);
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 3; ctx.beginPath();
            const cx = canvas.width/2, cy = canvas.height/2;
            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i]/128.0 - 1.0;
                let lx = (i/dataArray.length)*canvas.width, ly = cy + v*100;
                let ang = (i/dataArray.length)*Math.PI*2, r = 150 + v*50;
                let x = lx*(1-morphVal) + (cx + Math.cos(ang)*r)*morphVal;
                let y = ly*(1-morphVal) + (cy + Math.sin(ang)*r)*morphVal;
                if(i==0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.stroke();
        }

        // Scroll Performance
        const sections = document.querySelectorAll('.section'), dash = document.getElementById('dashboard');
        const junk = document.getElementById('earth-junk');

        window.onscroll = () => {
            const y = window.pageYOffset;
            stage.style.transform = `translate3d(0, 0, ${y}px)`;

            sections.forEach((s, i) => {
                const dist = Math.abs(y - (i * zoomStep));
                s.style.opacity = dist < 1200 ? "1" : "0";
                s.style.pointerEvents = dist < 500 ? "auto" : "none";
            });

            // Toggle junk visibility only when near Earth (index 3)
            if (junk) junk.style.opacity = Math.abs(y - 9000) < 2000 ? "0.4" : "0";

            const max = (planetsData.length - 1) * zoomStep;
            dash.style.opacity = y > max + 1000 ? "1" : "0";
            dash.style.pointerEvents = y > max + 1000 ? "auto" : "none";
        };

        // Inputs
        document.getElementById('hb-toggle').onclick = (e) => e.target.classList.toggle('active');
        document.getElementById('wave-morph').oninput = (e) => morphVal = e.target.value;
        document.querySelectorAll('[data-freq]').forEach(p => p.onpointerdown = () => {
            initAudio();
            const o = aCtx.createOscillator(), g = aCtx.createGain();
            o.frequency.value = p.dataset.freq;
            g.gain.setTargetAtTime(0.2, aCtx.currentTime, 0.1);
            g.gain.setTargetAtTime(0, aCtx.currentTime + 0.5, 0.1);
            o.connect(g); g.connect(analyser);
            o.start(); o.stop(aCtx.currentTime + 2);
        });
        window.scrollTo(0,0);
    </script>
</body>
</html>
