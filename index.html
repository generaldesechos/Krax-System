<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Frequencies | Universal Fix</title>
    <style>
        :root {
            --bg-dark: #020205;
            --text-gold: #f0e68c;
        }

        /* 1. Perspective MUST be on the wrapper for Firefox/Safari */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            height: 1200vh; /* Total scroll height */
        }

        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            perspective-origin: 50% 50%;
            pointer-events: none;
        }

        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        /* 2. Each section is fixed so they stay in view while zooming */
        .section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            opacity: 0; /* Hidden until scroll reaches it */
        }

        .info {
            text-align: center;
            margin-bottom: 20px;
            pointer-events: none;
        }

        .planet {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: inset -40px -40px 60px #000;
            -webkit-tap-highlight-color: transparent;
            /* Force hardware acceleration */
            transform: translate3d(0,0,0);
        }

        /* Planets */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 80px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #00d2ff, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #8b0000); }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.8rem;
            letter-spacing: 3px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="star-field"></div>
    <div class="scroll-hint">SCROLL TO FLY THROUGH SPACE</div>

    <div class="viewport">
        <div class="section" id="sec-0">
            <div class="info"><h1>THE SUN</h1><p>126.22 Hz</p></div>
            <div class="planet sun" data-freq="126.22"></div>
        </div>

        <div class="section" id="sec-1">
            <div class="info"><h2>MERCURY</h2><p>141.27 Hz</p></div>
            <div class="planet mercury" data-freq="141.27"></div>
        </div>

        <div class="section" id="sec-2">
            <div class="info"><h2>VENUS</h2><p>221.23 Hz</p></div>
            <div class="planet venus" data-freq="221.23"></div>
        </div>

        <div class="section" id="sec-3">
            <div class="info"><h2>EARTH</h2><p>194.18 Hz</p></div>
            <div class="planet earth" data-freq="194.18"></div>
        </div>

        <div class="section" id="sec-4">
            <div class="info"><h2>MARS</h2><p>144.72 Hz</p></div>
            <div class="planet mars" data-freq="144.72"></div>
        </div>
    </div>

    <script>
        const sections = document.querySelectorAll('.section');
        const planets = document.querySelectorAll('.planet');
        
        // Settings
        const zoomStep = 2000; // Pixels between planets

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;

            sections.forEach((section, index) => {
                const startPoint = index * zoomStep;
                // This calculates how far the planet is from the "camera"
                // 0 is the planet's home position, positive is coming toward you
                const zPos = scrollY - startPoint;

                // We hide planets that have already passed behind the camera (z > 1000)
                // or are too far in the distance to see
                if (zPos > -2500 && zPos < 1000) {
                    section.style.opacity = "1";
                    section.style.transform = `translate3d(0, 0, ${zPos}px)`;
                    section.style.pointerEvents = zPos > -500 ? "auto" : "none";
                } else {
                    section.style.opacity = "0";
                    section.style.pointerEvents = "none";
                }
            });
        });

        // Audio Logic (Same as before, robust for iOS)
        let audioCtx;
        function playFrequency(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        planets.forEach(p => {
            p.addEventListener('pointerdown', () => {
                playFrequency(parseFloat(p.getAttribute('data-freq')));
            });
        });

        // Initialize first section
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
