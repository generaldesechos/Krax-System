<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Frequencies | Final Stable</title>
    <style>
        :root {
            --bg: #020205;
            --gold: #f0e68c;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The scroll area */
        .scroll-track {
            height: 1500vh; /* Total length of the journey */
            position: relative;
        }

        /* The visible window - Sticky makes it follow you as you scroll */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            perspective: 800px; /* Crucial for 3D */
            perspective-origin: 50% 50%;
        }

        .star-field {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #050505 100%);
            z-index: -1;
        }

        /* The actual 3D stage */
        #stage {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .section {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .planet {
            width: 280px; height: 280px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset -30px -30px 50px #000;
            -webkit-tap-highlight-color: transparent;
            z-index: 50;
        }

        .info {
            text-align: center;
            margin-bottom: 20px;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* Dashboard Styles */
        #dashboard {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        .planet-row {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }

        .mini-card { display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .mini-planet {
            width: 60px; height: 60px; border-radius: 50%;
            margin-bottom: 5px; cursor: pointer;
            box-shadow: inset -10px -10px 15px #000;
        }

        /* Planet Colors */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 60px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #4a0e05); }

        .hint {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            font-size: 10px; letter-spacing: 2px; color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="scroll-track">
        <div class="sticky-wrapper">
            <div class="star-field"></div>
            <div class="hint">SCROLL TO BEGIN VOYAGE</div>
            
            <div id="stage">
                <div class="section" style="--depth: 0">
                    <div class="info"><h1>SUN</h1><p>126.22 Hz</p></div>
                    <div class="planet sun" data-freq="126.22"></div>
                </div>
                <div class="section" style="--depth: 1">
                    <div class="info"><h1>MERCURY</h1><p>141.27 Hz</p></div>
                    <div class="planet mercury" data-freq="141.27"></div>
                </div>
                <div class="section" style="--depth: 2">
                    <div class="info"><h1>VENUS</h1><p>221.23 Hz</p></div>
                    <div class="planet venus" data-freq="221.23"></div>
                </div>
                <div class="section" style="--depth: 3">
                    <div class="info"><h1>EARTH</h1><p>194.18 Hz</p></div>
                    <div class="planet earth" data-freq="194.18"></div>
                </div>
                <div class="section" style="--depth: 4">
                    <div class="info"><h1>MARS</h1><p>144.72 Hz</p></div>
                    <div class="planet mars" data-freq="144.72"></div>
                </div>
            </div>

            <div id="dashboard">
                <h3>ORBITAL SYNTHESIZER</h3>
                <div class="planet-row">
                    <div class="mini-card"><div class="mini-planet sun" data-freq="126.22"></div>SUN</div>
                    <div class="mini-card"><div class="mini-planet mercury" data-freq="141.27"></div>MERC</div>
                    <div class="mini-card"><div class="mini-planet venus" data-freq="221.23"></div>VENU</div>
                    <div class="mini-card"><div class="mini-planet earth" data-freq="194.18"></div>EART</div>
                    <div class="mini-card"><div class="mini-planet mars" data-freq="144.72"></div>MARS</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const sections = document.querySelectorAll('.section');
        const dashboard = document.getElementById('dashboard');
        const gap = 2000; // Pixels per planet

        // Initial setup of depths
        sections.forEach((s, i) => {
            s.style.transform = `translate3d(0, 0, ${i * -gap}px)`;
        });

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // 1. Move the stage (the zoom)
            // We use translate3d for the most efficient hardware acceleration
            stage.style.transform = `translate3d(0, 0, ${scrollY}px)`;

            // 2. Info text visibility
            sections.forEach((s, i) => {
                const zDist = Math.abs(scrollY - (i * gap));
                const info = s.querySelector('.info');
                info.style.opacity = (zDist < 500) ? "1" : "0";
                // Disable clicking on planets that are far away
                s.style.pointerEvents = (zDist < 500) ? "auto" : "none";
            });

            // 3. Dashboard trigger
            const maxScroll = (sections.length - 1) * gap;
            if (scrollY > maxScroll + 800) {
                dashboard.style.opacity = "1";
                dashboard.style.pointerEvents = "auto";
            } else {
                dashboard.style.opacity = "0";
                dashboard.style.pointerEvents = "none";
            }
        });

        // Audio
        let aCtx;
        function play(f) {
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator();
            const g = aCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f, aCtx.currentTime);
            g.gain.setValueAtTime(0, aCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.2, aCtx.currentTime + 0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + 2);
            o.connect(g); g.connect(aCtx.destination);
            o.start(); o.stop(aCtx.currentTime + 2);
        }

        document.querySelectorAll('[data-freq]').forEach(p => {
            p.addEventListener('pointerdown', (e) => {
                play(parseFloat(p.dataset.freq));
                // Add a little tap visual
                p.style.filter = "brightness(1.5)";
                setTimeout(() => p.style.filter = "brightness(1)", 150);
            });
        });
    </script>
</body>
</html>
