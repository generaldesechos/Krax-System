<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Frequencies | Sonic Voyage</title>
    <style>
        :root {
            --bg-dark: #020205;
            --text-gold: #f0e68c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Fixed background stars */
        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        /* 3D Space Setup */
        .container {
            height: 1200vh; /* Adjust for scroll length */
            perspective: 1000px;
        }

        #stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .section {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        .info {
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin-bottom: 20px;
        }

        .visible { opacity: 1; }

        /* Interactive Planets */
        .planet {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: inset -40px -40px 60px #000;
            position: relative;
        }

        .planet:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .planet::after {
            content: 'TAP TO HEAR';
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* Planets Appearance */
        .sun { background: radial-gradient(circle at 30% 30%, #ffcc33, #ff6600); box-shadow: 0 0 80px #ff6600; }
        .mercury { background: radial-gradient(circle at 30% 30%, #b5b5b5, #444); }
        .venus { background: radial-gradient(circle at 30% 30%, #e8c381, #6b4a1a); }
        .earth { background: radial-gradient(circle at 30% 30%, #3a7bd5, #00d2ff, #06163a); }
        .mars { background: radial-gradient(circle at 30% 30%, #ff4b2b, #8b0000); }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.9rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="star-field"></div>
    <div class="scroll-hint">SCROLL TO TRAVEL</div>

    <div class="container">
        <div id="stage">
            
            <div class="section" style="transform: translateZ(0px)">
                <div class="info visible">
                    <h1>THE SUN</h1>
                    <p>126.22 Hz (G#)</p>
                </div>
                <div class="planet sun" data-freq="126.22"></div>
            </div>

            <div class="section" style="transform: translateZ(-2500px)">
                <div class="info">
                    <h2>MERCURY</h2>
                    <p>141.27 Hz (C#)</p>
                </div>
                <div class="planet mercury" data-freq="141.27"></div>
            </div>

            <div class="section" style="transform: translateZ(-5000px)">
                <div class="info">
                    <h2>VENUS</h2>
                    <p>221.23 Hz (A)</p>
                </div>
                <div class="planet venus" data-freq="221.23"></div>
            </div>

            <div class="section" style="transform: translateZ(-7500px)">
                <div class="info">
                    <h2>EARTH</h2>
                    <p>194.18 Hz (G)</p>
                </div>
                <div class="planet earth" data-freq="194.18"></div>
            </div>

            <div class="section" style="transform: translateZ(-10000px)">
                <div class="info">
                    <h2>MARS</h2>
                    <p>144.72 Hz (D)</p>
                </div>
                <div class="planet mars" data-freq="144.72"></div>
            </div>

        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const infos = document.querySelectorAll('.info');
        const planets = document.querySelectorAll('.planet');

        // 1. Zoom logic
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            stage.style.transform = `translateZ(${scrollY}px)`;

            // Visibility logic
            document.querySelectorAll('.section').forEach((section, index) => {
                const depth = index * 2500;
                const distance = Math.abs(scrollY - depth);
                if (distance < 600) {
                    infos[index].classList.add('visible');
                } else {
                    infos[index].classList.remove('visible');
                }
            });
        });

        // 2. Audio Engine
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playFrequency(freq) {
            // Resume context if suspended (browser security)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Fade Out Logic
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // Start volume
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2); // Fade to 0 over 2s

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 2); // Stop after 2s
        }

        // Add event listeners to planets
        planets.forEach(planet => {
            planet.addEventListener('click', () => {
                const freq = parseFloat(planet.getAttribute('data-freq'));
                playFrequency(freq);
                
                // Visual feedback
                planet.style.filter = 'brightness(2) blur(2px)';
                setTimeout(() => {
                    planet.style.filter = 'brightness(1) blur(0px)';
                }, 200);
            });
        });
    </script>
</body>
</html>
